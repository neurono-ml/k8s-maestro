name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: release_notes
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          
          if [ -f CHANGELOG.md ]; then
            # Extract content between this version header and the next version header
            # The pattern matches ## [VERSION] and captures everything until the next ## [ or end of file
            awk -v version="$VERSION" '
              BEGIN { in_release=0; found=0 }
              
              # When we find the version header
              /^## \[/ {
                if (index($0, "[v" version "]") > 0 || index($0, "[" version "]") > 0) {
                  in_release=1
                  found=1
                  next  # Skip the version header line itself
                } else if (in_release) {
                  # We hit another version header, stop capturing
                  in_release=0
                  exit
                }
              }
              
              # Capture lines while in the release section
              in_release { print }
            ' CHANGELOG.md > release_notes.md
            
            # Trim leading/trailing whitespace and check if empty
            sed -i '/./,$!d' release_notes.md
            sed -i ':a;/^[[:space:]]*$/{$d;N;ba}' release_notes.md 2>/dev/null || true
            
            # If no release notes found for this version, use a default message
            if [ ! -s release_notes.md ]; then
              echo "Release $VERSION - See [CHANGELOG.md](CHANGELOG.md) for details." > release_notes.md
              echo "::warning::No release notes found for version $VERSION in CHANGELOG.md"
            else
              echo "::notice::Successfully extracted release notes for version $VERSION"
              echo "=== Release Notes ==="
              cat release_notes.md
              echo "===================="
            fi
          else
            echo "Release $VERSION" > release_notes.md
            echo "::warning::CHANGELOG.md not found"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.extract_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.extract_version.outputs.version, 'beta') || contains(steps.extract_version.outputs.version, 'alpha') }}
          generate_release_notes: false
